<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=3000, initial-scale=0.4, minimum-scale=0.2, maximum-scale=2"/>
  <title>Brett & Lilly 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Caveat+Brush&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1410;
      color: #f5e6d3;
      width: 3600px;
      height: 3600px;
      overflow: auto;
      position: relative;
    }

    /* Cork board texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(60,40,25,0.4) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(60,40,25,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(40,25,15,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── PASSWORD GATE ── */
    #gate {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0e1e 0%, #0d0a0e 80%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #gate.fade-out { opacity: 0; pointer-events: none; }
    .gate-title {
      font-size: 3rem;
      letter-spacing: 0.15em;
      color: #f5e6d3;
      margin-bottom: 0.3em;
      text-align: center;
    }
    .gate-sub {
      font-size: 1rem;
      color: #c4a882;
      letter-spacing: 0.3em;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .hearts {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    #pw-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid #c4a882;
      color: #f5e6d3;
      font-family: 'Georgia', serif;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-align: center;
      padding: 0.5rem 1rem;
      width: 220px;
      outline: none;
      caret-color: #e8c97a;
    }
    #pw-input::placeholder { color: #6e5a4a; }
    #pw-error { color: #c4665a; font-size: 0.85rem; margin-top: 0.8rem; letter-spacing: 0.1em; height: 1.2em; }
    #pw-btn {
      margin-top: 1.8rem;
      background: none;
      border: 1px solid #c4a882;
      color: #c4a882;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      padding: 0.6rem 2rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    #pw-btn:hover { background: #c4a882; color: #0d0a0e; }

    /* ── BOARD ── */
    #board {
      display: none;
      position: absolute;
      top: 0; left: 0;
      width: 3600px;
      height: 3600px;
    }
    #board.visible { display: block; }

    /* SVG strings layer */
    #strings {
      position: absolute;
      top: 0; left: 0;
      width: 3600px;
      height: 3600px;
      z-index: 1;
      pointer-events: none;
    }

    /* ── CENTER HUB ── */
    .hub {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #2a1e2e, #0d0a0e);
      border: 3px solid #e8c97a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 0 60px rgba(232,201,122,0.2), 4px 6px 25px rgba(0,0,0,0.6);
      z-index: 5;
      cursor: grab;
    }
    .hub .hub-names {
      font-size: 1.6rem;
      letter-spacing: 0.1em;
      color: #f5e6d3;
    }
    .hub .hub-names span { color: #e8c97a; font-style: italic; }
    .hub .hub-date {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #c4a882;
      margin-top: 6px;
    }
    .hub .hub-counter {
      font-size: 0.8rem;
      color: #9a8070;
      margin-top: 8px;
      letter-spacing: 0.15em;
    }
    .hub .hub-counter em { color: #e8c97a; font-style: normal; font-size: 1.1rem; }

    /* ── NODES ── */
    .node {
      position: absolute;
      z-index: 10;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      transition: box-shadow 0.2s ease;
    }
    .node:hover { z-index: 50; }
    .node.dragging { z-index: 100; cursor: grabbing; }

    /* Photo nodes */
    .node.photo {
      width: 180px;
      background: #fafaf5;
      padding: 10px 10px 38px 10px;
      box-shadow: 3px 5px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,180,140,0.1);
    }
    .node.photo img {
      width: 100%;
      height: 155px;
      object-fit: cover;
      display: block;
      filter: brightness(0.95) saturate(0.9) sepia(0.08);
      cursor: pointer;
    }
    .node.photo .photo-label {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: #4a3a30;
      text-align: center;
      margin-top: 8px;
    }

    /* Note nodes */
    .node.note {
      width: 200px;
      padding: 18px 20px 22px;
      font-family: 'Caveat', cursive;
      font-size: 1.2rem;
      line-height: 1.5;
      box-shadow: 3px 5px 18px rgba(0,0,0,0.45);
    }
    .node.note::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(transparent, transparent 26px, rgba(180,140,100,0.15) 26px, rgba(180,140,100,0.15) 27px);
      pointer-events: none;
    }
    .node.note.cream  { background: #f5efdf; color: #2a1a0e; }
    .node.note.yellow { background: #fff8c5; color: #2a1a0e; }
    .node.note.pink   { background: #fde8e8; color: #2a1a0e; }
    .node.note.white  { background: #fafafa; color: #1a1a1a; }
    .node.note.torn   { background: #f0e8d5; color: #2a1a0e; clip-path: polygon(0 0,100% 2%,99% 98%,1% 100%); }
    .node.note .sig {
      display: block;
      margin-top: 8px;
      font-family: 'Caveat Brush', cursive;
      font-size: 1rem;
      opacity: 0.6;
    }

    /* Pin on top */
    .node::after {
      content: '📌';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%) rotate(15deg);
      font-size: 1.3rem;
      filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.4));
      pointer-events: none;
    }

    /* Tape strips on some photos */
    .node.taped::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 80px;
      height: 24px;
      background: rgba(255, 248, 220, 0.5);
      border: 1px solid rgba(200, 180, 140, 0.25);
      z-index: 2;
    }
    .node.taped::after { display: none; }

    /* Gift Card nodes — realistic store cards */
    .node.coupon {
      width: 280px;
      height: 170px;
      padding: 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 4px 6px 24px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.1);
    }
    .node.coupon::after {
      content: '📌';
      position: absolute;
      top: -12px;
      right: 18px;
      left: auto;
      transform: rotate(-10deg);
      font-size: 1.3rem;
    }
    .gc-inner {
      width: 100%;
      height: 100%;
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .gc-logo {
      font-family: 'Georgia', serif;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.2em;
    }
    .gc-type {
      font-family: Arial, sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 2px;
    }
    .gc-value {
      font-family: Arial, sans-serif;
      font-size: 2.4rem;
      font-weight: 800;
      position: absolute;
      right: 22px;
      top: 18px;
    }
    .gc-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .gc-code {
      font-family: 'Courier New', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }
    .gc-fine {
      font-family: Arial, sans-serif;
      font-size: 0.5rem;
      opacity: 0.5;
      max-width: 160px;
      text-align: right;
      line-height: 1.3;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 8888;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border: 1px solid #2a2020; }
    #lightbox-close { position:absolute; top:20px; right:30px; font-size:2rem; color:#c4a882; cursor:pointer; background:none; border:none; line-height:1; z-index: 9000; }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="hearts">🤍</div>
  <div class="gate-title">Brett <span style="color:#e8c97a;font-style:italic">&amp;</span> Lilly</div>
  <div class="gate-sub">SINCE JULY 10, 2013</div>
  <input id="pw-input" type="password" placeholder="enter password" autocomplete="off" />
  <div id="pw-error"></div>
  <button id="pw-btn">ENTER</button>
</div>

<!-- BOARD -->
<div id="board">
  <svg id="strings"></svg>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lb-img" src="" />
</div>

<script>
// ── PASSWORD ──
const CORRECT = 'lilly25';
const pwInput = document.getElementById('pw-input');
const gate = document.getElementById('gate');
const board = document.getElementById('board');

function unlock() {
  if (pwInput.value.trim().toLowerCase() === CORRECT) {
    gate.classList.add('fade-out');
    setTimeout(() => {
      gate.style.display = 'none';
      board.classList.add('visible');
      initBoard();
      // Scroll to center
      window.scrollTo(1800 - window.innerWidth/2, 1800 - window.innerHeight/2);
    }, 800);
  } else {
    document.getElementById('pw-error').textContent = 'try again ♡';
    pwInput.value = '';
    pwInput.focus();
    setTimeout(() => document.getElementById('pw-error').textContent = '', 2000);
  }
}
document.getElementById('pw-btn').addEventListener('click', unlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// Day counter
const start = new Date('2013-07-10');
const today = new Date();
const days = Math.floor((today - start) / (1000*60*60*24));

// ── DATA ──
const photos = [
  { src: 'photos/01.jpg', label: 'us 💛' },
  { src: 'photos/02.jpg', label: '' },
  { src: 'photos/03.jpg', label: '' },
  { src: 'photos/04.jpg', label: '' },
  { src: 'photos/05.jpg', label: '' },
  { src: 'photos/06.jpg', label: '' },
  { src: 'photos/07.png', label: '' },
  { src: 'photos/08.jpg', label: '' },
  { src: 'photos/09.png', label: '' },
  { src: 'photos/10.jpg', label: '' },
  { src: 'photos/11.jpg', label: 'forever ♥' },
  { src: 'photos/12.png', label: '' },
  { src: 'photos/13.jpg', label: '' },
  { src: 'photos/14.jpg', label: 'my favorite' },
  { src: 'photos/15.jpg', label: '' },
  { src: 'photos/16.jpg', label: '' },
  { src: 'photos/17.jpg', label: '' },
  { src: 'photos/note1.png', label: '' },
  { src: 'photos/note2.png', label: '' },
  { src: 'photos/note3.png', label: '' },
];

const notes = [
  { text: "I've been thinking about you all day and I can't concentrate on anything else. Come home soon.", color: 'yellow', sig: '— L ♥' },
  { text: "Last night was insane. I'm still not over it. You know exactly what you do to me.", color: 'cream', sig: '— Lilly' },
  { text: "I want you right now. That's it. That's the note.", color: 'pink', sig: '— L ❤️' },
  { text: "You make me feel things I don't have words for. I'm obsessed with you in the best way.", color: 'white', sig: '— Lilly' },
  { text: "I don't care what we do tonight as long as it ends the way I'm thinking.", color: 'torn', sig: '— L' },
  { text: "Every single time. I don't know how you do it but please never stop.", color: 'cream', sig: '— Lilly ♥' },
  { text: "I still get butterflies. After all this time. It's embarrassing honestly. I love you.", color: 'yellow', sig: '— Lilly ♥' },
  { text: "Come to bed. I'm waiting. Don't make me ask twice.", color: 'pink', sig: '— L 😈' },
  { text: "Nobody else gets to have you. Mine. All mine.", color: 'torn', sig: '— L ♥' },
  { text: "You're the only person I want in my space, in my bed, in my life. Just you. Forever.", color: 'cream', sig: '— L' },
  { text: "I woke up thinking about you. Then I fell back asleep thinking about you. This is your fault.", color: 'yellow', sig: '— Lilly' },
  { text: "The way you look at me sometimes... you know what it does to me.", color: 'pink', sig: '— L ❤️' },
  { text: "Tonight I have plans for you. Very specific plans. You're going to like them.", color: 'white', sig: '— Lilly 😏' },
  { text: "I'm yours completely. Do with that what you want.", color: 'torn', sig: '— L ♥' },
  { text: "Brett. You ruin me. In the best way. I don't want to recover.", color: 'cream', sig: '— Lilly' },
  { text: "I can't keep my hands off you and I'm not even sorry about it.", color: 'pink', sig: '— L ❤️' },
  { text: "Every time I think I've figured you out you do something that makes me fall all over again.", color: 'white', sig: '— Lilly' },
  { text: "I think about the first time we... never mind. I'm smiling. You know why.", color: 'torn', sig: '— L ♥' },
  { text: "You + me + absolutely nobody else around tonight. That's everything I want.", color: 'cream', sig: '— L 🖤' },
  { text: "Being in love with you is my favorite thing I've ever done.", color: 'yellow', sig: '— Lilly 😘' },
  { text: "If you read this before coming home, hurry up.", color: 'pink', sig: '— L ❤️' },
  { text: "You hold me like I'm something worth holding onto. I never want to stop feeling that.", color: 'white', sig: '— Lilly' },
  { text: "I love you so much it makes me want to do things I can't write down.", color: 'cream', sig: '— Lilly ♥' },
  { text: "You have absolutely no idea what you look like when you sleep. I do. It's my favorite view.", color: 'yellow', sig: '— L' },
  { text: "The chemistry we have should be illegal. Not complaining. Not even a little.", color: 'pink', sig: '— Lilly 🔥' },
  { text: "Brett Durbin, you are the sexiest most annoying person I've ever met and I'd choose you every single time.", color: 'white', sig: '— L ♥' },
  { text: "I'm yours. You know that. Now act like it tonight.", color: 'torn', sig: '— Lilly 😈' },
  { text: "Loving you is the easiest and the hardest thing all at once. I wouldn't trade it for anything.", color: 'cream', sig: '— L ❤️' },
  { text: "I wrote you like four other versions of this note and deleted them all. This is the tame one.", color: 'torn', sig: '— L 🙈' },
  { text: "Okay I know we have things to do today but I really really don't want you to get up.", color: 'yellow', sig: '— Lilly 😅' },
];

// Fake coupons to real stores
const coupons = [
  {
    brand: 'SEPHORA',
    brandColor: '#000',
    bgColor: '#fff',
    accentColor: '#000',
    value: '$150',
    desc: 'E-Gift Card',
    fine: 'Present this code in-store or online at sephora.com. One-time use. No cash value.',
    code: 'SEPH-7742-LILLY-XO',
    logo: '✦ SEPHORA ✦'
  },
  {
    brand: 'TARGET',
    brandColor: '#cc0000',
    bgColor: '#fff',
    accentColor: '#cc0000',
    value: '$200',
    desc: 'Gift Card',
    fine: 'Redeemable at any Target store or target.com. Cannot be used for previous purchases.',
    code: 'TGT-9918-BL-2025',
    logo: '◎ TARGET'
  },
  {
    brand: 'STARBUCKS',
    brandColor: '#00704A',
    bgColor: '#f1f0eb',
    accentColor: '#00704A',
    value: '$75',
    desc: 'Rewards Gift Card',
    fine: 'Load to your Starbucks app or present barcode in-store. Stars not included.',
    code: 'SBUX-4455-LILLY',
    logo: '☕ STARBUCKS'
  }
];

// ── BUILD BOARD ──
const CX = 1800, CY = 1800; // Center of 3600x3600 board
let nodeData = []; // {x, y, el, id}

function initBoard() {
  const svg = document.getElementById('strings');

  // Hub
  const hub = document.createElement('div');
  hub.className = 'hub';
  hub.style.left = (CX - 100) + 'px';
  hub.style.top = (CY - 100) + 'px';
  hub.innerHTML = `
    <div class="hub-names">Brett <span>&amp;</span> Lilly</div>
    <div class="hub-date">JULY 10, 2013</div>
    <div class="hub-counter"><em>${days.toLocaleString()}</em> days</div>
  `;
  board.appendChild(hub);
  nodeData.push({ x: CX, y: CY, el: hub, id: 'hub', w: 200, h: 200 });

  // Interleave photos and notes
  let items = [];
  let pi = 0, ni = 0;
  while (pi < photos.length || ni < notes.length) {
    if (pi < photos.length) items.push({ type: 'photo', data: photos[pi++] });
    if (ni < notes.length) items.push({ type: 'note', data: notes[ni++] });
  }

  // Spiral placement — spread wide
  const baseR = 300;
  const spiralGrowth = 28;
  const goldenAngle = 2.399963; // ~137.5°

  items.forEach((item, i) => {
    const angle = i * goldenAngle;
    const r = baseR + Math.sqrt(i) * spiralGrowth * 4 + (Math.random() * 60 - 30);
    const x = CX + Math.cos(angle) * r;
    const y = CY + Math.sin(angle) * r;
    const rot = (Math.random() * 10 - 5).toFixed(1);
    const taped = Math.random() > 0.6;

    const el = document.createElement('div');

    if (item.type === 'photo') {
      el.className = 'node photo' + (taped ? ' taped' : '');
      el.style.transform = `rotate(${rot}deg)`;
      el.innerHTML = `<img src="${item.data.src}" loading="lazy" draggable="false"/>${item.data.label ? `<div class="photo-label">${item.data.label}</div>` : ''}`;
      // Lightbox on click
      const img = el.querySelector('img');
      img.addEventListener('click', () => {
        if (!el._wasDragged) {
          document.getElementById('lb-img').src = item.data.src;
          document.getElementById('lightbox').classList.add('active');
        }
      });
      el.style.left = (x - 90) + 'px';
      el.style.top = (y - 100) + 'px';
      nodeData.push({ x, y, el, id: 'p' + i, w: 180, h: 200 });
    } else {
      el.className = `node note ${item.data.color}`;
      el.style.transform = `rotate(${rot}deg)`;
      el.innerHTML = `${item.data.text}<span class="sig">${item.data.sig}</span>`;
      el.style.left = (x - 100) + 'px';
      el.style.top = (y - 60) + 'px';
      nodeData.push({ x, y, el, id: 'n' + i, w: 200, h: 140 });
    }

    board.appendChild(el);
  });

  // Add fake coupons scattered around
  coupons.forEach((coupon, i) => {
    const angle = (i / coupons.length) * Math.PI * 2 + 0.8;
    const r = 500 + Math.random() * 300;
    const x = CX + Math.cos(angle) * r;
    const y = CY + Math.sin(angle) * r;
    const rot = (Math.random() * 6 - 3).toFixed(1);

    const el = document.createElement('div');
    el.className = 'node coupon';
    el.style.transform = `rotate(${rot}deg)`;
    el.innerHTML = `
      <div class="gc-inner" style="background:${coupon.bgColor}; color:${coupon.brandColor};">
        <div>
          <div class="gc-logo" style="color:${coupon.accentColor}">${coupon.logo}</div>
          <div class="gc-type" style="color:${coupon.brandColor}">${coupon.desc}</div>
        </div>
        <div class="gc-value" style="color:${coupon.accentColor}">${coupon.value}</div>
        <div class="gc-bottom">
          <div class="gc-code" style="color:${coupon.brandColor}">${coupon.code}</div>
          <div class="gc-fine" style="color:${coupon.brandColor}">${coupon.fine}</div>
        </div>
      </div>
    `;
    el.style.left = (x - 120) + 'px';
    el.style.top = (y - 90) + 'px';
    board.appendChild(el);
    nodeData.push({ x, y, el, id: 'c' + i, w: 240, h: 180 });
  });

  // Draw strings
  drawStrings(svg);

  // Dragging
  setupDrag();
}

function drawStrings(svg) {
  svg.innerHTML = '';
  const hub = nodeData[0];
  const others = nodeData.slice(1);

  others.forEach((node, i) => {
    // String to hub — gold thread
    addLine(svg, hub.x, hub.y, node.x, node.y, 'rgba(232,201,122,0.18)', 1.2);

    // Neighbor string — red thread
    if (i > 0 && Math.random() > 0.25) {
      addLine(svg, others[i-1].x, others[i-1].y, node.x, node.y, 'rgba(196,102,90,0.2)', 0.8);
    }

    // Skip connections
    if (i > 4 && Math.random() > 0.7) {
      const j = Math.floor(Math.random() * i);
      addLine(svg, others[j].x, others[j].y, node.x, node.y, 'rgba(196,168,130,0.12)', 0.6, '6,6');
    }
  });
}

function addLine(svg, x1, y1, x2, y2, stroke, width, dash) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('x1', x1);
  line.setAttribute('y1', y1);
  line.setAttribute('x2', x2);
  line.setAttribute('y2', y2);
  line.setAttribute('stroke', stroke);
  line.setAttribute('stroke-width', width);
  if (dash) line.setAttribute('stroke-dasharray', dash);
  svg.appendChild(line);
}

// ── DRAG NODES ──
function setupDrag() {
  let dragging = null, offX = 0, offY = 0, startX = 0, startY = 0, moved = false;

  function onStart(clientX, clientY, target) {
    const nodeEl = target.closest('.node, .hub');
    if (!nodeEl) return;
    const nd = nodeData.find(n => n.el === nodeEl);
    if (!nd) return;

    dragging = nd;
    moved = false;
    startX = clientX;
    startY = clientY;
    const rect = nodeEl.getBoundingClientRect();
    offX = clientX - rect.left + window.scrollX - parseFloat(nodeEl.style.left || 0);
    offY = clientY - rect.top + window.scrollY - parseFloat(nodeEl.style.top || 0);

    // Use absolute offset
    offX = clientX + window.scrollX - nd.x;
    offY = clientY + window.scrollY - nd.y;

    nodeEl.classList.add('dragging');
    nodeEl._wasDragged = false;
  }

  function onMove(clientX, clientY) {
    if (!dragging) return;
    const dx = clientX - startX;
    const dy = clientY - startY;
    if (Math.abs(dx) > 4 || Math.abs(dy) > 4) moved = true;

    const newX = clientX + window.scrollX - offX;
    const newY = clientY + window.scrollY - offY;
    dragging.x = newX;
    dragging.y = newY;

    const hw = dragging.w / 2;
    const hh = dragging.h / 2;
    dragging.el.style.left = (newX - hw) + 'px';
    dragging.el.style.top = (newY - hh) + 'px';
    dragging.el._wasDragged = moved;

    // Redraw strings connected to this node
    redrawStrings();
  }

  function onEnd() {
    if (dragging) {
      dragging.el.classList.remove('dragging');
      dragging = null;
    }
  }

  // Mouse
  board.addEventListener('mousedown', e => {
    if (e.target.closest('#lightbox')) return;
    onStart(e.clientX, e.clientY, e.target);
  });
  window.addEventListener('mousemove', e => {
    if (dragging) { e.preventDefault(); onMove(e.clientX, e.clientY); }
  });
  window.addEventListener('mouseup', onEnd);

  // Touch
  board.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    const t = e.touches[0];
    const nodeEl = t.target.closest('.node, .hub');
    if (nodeEl) {
      e.preventDefault();
      onStart(t.clientX, t.clientY, t.target);
    }
  }, { passive: false });
  window.addEventListener('touchmove', e => {
    if (dragging && e.touches.length === 1) {
      e.preventDefault();
      onMove(e.touches[0].clientX, e.touches[0].clientY);
    }
  }, { passive: false });
  window.addEventListener('touchend', onEnd);
}

function redrawStrings() {
  const svg = document.getElementById('strings');
  // Simple: remove and recreate (fast enough for ~50 nodes)
  // But for perf, let's just update existing lines
  // Actually let's store connections and update
  drawStrings(svg);
}

// Lightbox
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('active');
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) {
    document.getElementById('lightbox').classList.remove('active');
  }
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
</script>
