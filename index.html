<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Brett & Lilly 💛</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=Caveat+Brush&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1410;
      color: #f5e6d3;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: grab;
    }
    body.dragging-node { cursor: grabbing; }

    /* ── PASSWORD GATE ── */
    #gate {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a0e1e 0%, #0d0a0e 80%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #gate.fade-out { opacity: 0; pointer-events: none; }
    .gate-title {
      font-size: 3rem;
      letter-spacing: 0.15em;
      color: #f5e6d3;
      margin-bottom: 0.3em;
      text-align: center;
    }
    .gate-sub {
      font-size: 1rem;
      color: #c4a882;
      letter-spacing: 0.3em;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    .hearts {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    #pw-input {
      background: transparent;
      border: none;
      border-bottom: 2px solid #c4a882;
      color: #f5e6d3;
      font-family: 'Georgia', serif;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      text-align: center;
      padding: 0.5rem 1rem;
      width: 220px;
      outline: none;
      caret-color: #e8c97a;
    }
    #pw-input::placeholder { color: #6e5a4a; }
    #pw-error { color: #c4665a; font-size: 0.85rem; margin-top: 0.8rem; letter-spacing: 0.1em; height: 1.2em; }
    #pw-btn {
      margin-top: 1.8rem;
      background: none;
      border: 1px solid #c4a882;
      color: #c4a882;
      font-family: 'Georgia', serif;
      font-size: 0.9rem;
      letter-spacing: 0.25em;
      padding: 0.6rem 2rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    #pw-btn:hover { background: #c4a882; color: #0d0a0e; }

    /* ── CANVAS AREA ── */
    #web-container {
      display: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
    }
    #web-container.visible { display: block; }

    #web-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }

    /* ── HEADER OVERLAY ── */
    .web-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      text-align: center;
      padding: 18px 20px 14px;
      background: linear-gradient(180deg, rgba(13,10,14,0.9) 0%, transparent 100%);
      z-index: 100;
      pointer-events: none;
    }
    .web-header h1 {
      font-size: 1.8rem;
      letter-spacing: 0.12em;
      color: #f5e6d3;
      font-weight: normal;
    }
    .web-header h1 span { color: #e8c97a; font-style: italic; }
    .web-header .sub {
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      color: #c4a882;
      margin-top: 4px;
    }

    /* ── NODES ── */
    .web-node {
      position: absolute;
      cursor: grab;
      transition: box-shadow 0.3s ease, transform 0.15s ease;
      z-index: 10;
      user-select: none;
      -webkit-user-select: none;
    }
    .web-node:hover { z-index: 50; transform: scale(1.05); }
    .web-node.active { cursor: grabbing; z-index: 100; transform: scale(1.08); }

    /* Photo nodes */
    .web-node.photo {
      width: 140px;
      background: #fafaf5;
      padding: 8px 8px 32px 8px;
      box-shadow: 3px 5px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(200,180,140,0.1);
    }
    .web-node.photo img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
      filter: brightness(0.95) saturate(0.9) sepia(0.08);
    }
    .web-node.photo .photo-label {
      font-family: 'Caveat', cursive;
      font-size: 0.85rem;
      color: #4a3a30;
      text-align: center;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Note nodes */
    .web-node.note {
      width: 170px;
      padding: 14px 16px 16px;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      line-height: 1.5;
      box-shadow: 3px 5px 18px rgba(0,0,0,0.45);
    }
    .web-node.note::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(transparent, transparent 24px, rgba(180,140,100,0.15) 24px, rgba(180,140,100,0.15) 25px);
      pointer-events: none;
      border-radius: inherit;
    }
    .web-node.note.cream  { background: #f5efdf; color: #2a1a0e; }
    .web-node.note.yellow { background: #fff8c5; color: #2a1a0e; }
    .web-node.note.pink   { background: #fde8e8; color: #2a1a0e; }
    .web-node.note.white  { background: #fafafa; color: #1a1a1a; }
    .web-node.note.torn   { background: #f0e8d5; color: #2a1a0e; clip-path: polygon(0 0,100% 2%,99% 98%,1% 100%); }
    .web-node.note .sig {
      display: block;
      margin-top: 8px;
      font-family: 'Caveat Brush', cursive;
      font-size: 0.9rem;
      opacity: 0.65;
    }

    /* Pin on top of node */
    .web-node::after {
      content: '📌';
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(15deg);
      font-size: 1.1rem;
      filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.4));
      pointer-events: none;
    }

    /* Center hub */
    .web-node.hub {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #2a1e2e, #0d0a0e);
      border: 2px solid #e8c97a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 0 40px rgba(232,201,122,0.15), 3px 5px 20px rgba(0,0,0,0.6);
    }
    .web-node.hub::after { display: none; }
    .web-node.hub .hub-names {
      font-size: 1.3rem;
      letter-spacing: 0.08em;
      color: #f5e6d3;
    }
    .web-node.hub .hub-names span { color: #e8c97a; font-style: italic; }
    .web-node.hub .hub-date {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #c4a882;
      margin-top: 4px;
    }
    .web-node.hub .hub-counter {
      font-size: 0.7rem;
      color: #9a8070;
      margin-top: 6px;
      letter-spacing: 0.15em;
    }
    .web-node.hub .hub-counter em { color: #e8c97a; font-style: normal; font-size: 0.9rem; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 8888;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #lightbox.active { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border: 1px solid #2a2020; }
    #lightbox-close { position:absolute; top:20px; right:30px; font-size:2rem; color:#c4a882; cursor:pointer; background:none; border:none; line-height:1; z-index: 9000; }

    /* Instructions */
    .instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #5a4a3a;
      z-index: 100;
      pointer-events: none;
      text-align: center;
      opacity: 0.7;
    }

    /* Cork texture overlay */
    #web-container::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(60,40,25,0.3) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(60,40,25,0.2) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(40,25,15,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="gate">
  <div class="hearts">🤍</div>
  <div class="gate-title">Brett <span style="color:#e8c97a;font-style:italic">&amp;</span> Lilly</div>
  <div class="gate-sub">SINCE JULY 10, 2013</div>
  <input id="pw-input" type="password" placeholder="enter password" autocomplete="off" />
  <div id="pw-error"></div>
  <button id="pw-btn">ENTER</button>
</div>

<!-- WEB CONTAINER -->
<div id="web-container">
  <svg id="web-canvas"></svg>

  <div class="web-header">
    <h1>Brett <span>&amp;</span> Lilly</h1>
    <div class="sub">SINCE JULY 10, 2013 · <span id="days-count">—</span> DAYS</div>
  </div>

  <div class="instructions">drag to move · click photos to enlarge · scroll to zoom</div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lb-img" src="" />
</div>

<script>
// ── PASSWORD GATE ──
const CORRECT = 'lilly25';
const pwInput = document.getElementById('pw-input');
const pwBtn = document.getElementById('pw-btn');
const pwError = document.getElementById('pw-error');
const gate = document.getElementById('gate');
const webContainer = document.getElementById('web-container');

function unlock() {
  if (pwInput.value.trim().toLowerCase() === CORRECT) {
    gate.classList.add('fade-out');
    setTimeout(() => {
      gate.style.display = 'none';
      webContainer.classList.add('visible');
      initWeb();
    }, 800);
  } else {
    pwError.textContent = 'try again ♡';
    pwInput.value = '';
    pwInput.focus();
    setTimeout(() => pwError.textContent = '', 2000);
  }
}
pwBtn.addEventListener('click', unlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

// Day counter
const start = new Date('2013-07-10');
const today = new Date();
const days = Math.floor((today - start) / (1000*60*60*24));
document.getElementById('days-count').textContent = days.toLocaleString();

// ── DATA ──
const photos = [
  { src: 'photos/01.jpg', label: 'us 💛' },
  { src: 'photos/02.jpg', label: '' },
  { src: 'photos/03.jpg', label: '' },
  { src: 'photos/04.jpg', label: '' },
  { src: 'photos/05.jpg', label: '' },
  { src: 'photos/06.jpg', label: '' },
  { src: 'photos/07.png', label: '' },
  { src: 'photos/08.jpg', label: '' },
  { src: 'photos/09.png', label: '' },
  { src: 'photos/10.jpg', label: '' },
  { src: 'photos/11.jpg', label: 'forever ♥' },
  { src: 'photos/12.png', label: '' },
  { src: 'photos/13.jpg', label: '' },
  { src: 'photos/14.jpg', label: 'my favorite' },
  { src: 'photos/15.jpg', label: '' },
  { src: 'photos/16.jpg', label: '' },
  { src: 'photos/17.jpg', label: '' },
  { src: 'photos/note1.png', label: '' },
  { src: 'photos/note2.png', label: '' },
  { src: 'photos/note3.png', label: '' },
];

const notes = [
  { text: "I've been thinking about you all day and I can't concentrate on anything else. Come home soon.", color: 'yellow', sig: '— L ♥' },
  { text: "Last night was insane. I'm still not over it. You know exactly what you do to me.", color: 'cream', sig: '— Lilly' },
  { text: "I want you right now. That's it. That's the note.", color: 'pink', sig: '— L ❤️' },
  { text: "You make me feel things I don't have words for. I'm obsessed with you in the best way.", color: 'white', sig: '— Lilly' },
  { text: "I don't care what we do tonight as long as it ends the way I'm thinking.", color: 'torn', sig: '— L' },
  { text: "Every single time. I don't know how you do it but please never stop.", color: 'cream', sig: '— Lilly ♥' },
  { text: "I still get butterflies. After all this time. It's embarrassing honestly. I love you.", color: 'yellow', sig: '— Lilly ♥' },
  { text: "Come to bed. I'm waiting. Don't make me ask twice.", color: 'pink', sig: '— L 😈' },
  { text: "Nobody else gets to have you. Mine. All mine.", color: 'torn', sig: '— L ♥' },
  { text: "You're the only person I want in my space, in my bed, in my life. Just you. Forever.", color: 'cream', sig: '— L' },
  { text: "I woke up thinking about you. Then I fell back asleep thinking about you. This is your fault.", color: 'yellow', sig: '— Lilly' },
  { text: "The way you look at me sometimes... you know what it does to me.", color: 'pink', sig: '— L ❤️' },
  { text: "Tonight I have plans for you. Very specific plans. You're going to like them.", color: 'white', sig: '— Lilly 😏' },
  { text: "I'm yours completely. Do with that what you want.", color: 'torn', sig: '— L ♥' },
  { text: "Brett. You ruin me. In the best way. I don't want to recover.", color: 'cream', sig: '— Lilly' },
  { text: "I can't keep my hands off you and I'm not even sorry about it.", color: 'pink', sig: '— L ❤️' },
  { text: "Every time I think I've figured you out you do something that makes me fall all over again.", color: 'white', sig: '— Lilly' },
  { text: "I think about the first time we... never mind. I'm smiling. You know why.", color: 'torn', sig: '— L ♥' },
  { text: "You + me + absolutely nobody else around tonight. That's everything I want.", color: 'cream', sig: '— L 🖤' },
  { text: "Being in love with you is my favorite thing I've ever done.", color: 'yellow', sig: '— Lilly 😘' },
  { text: "If you read this before coming home, hurry up.", color: 'pink', sig: '— L ❤️' },
  { text: "You hold me like I'm something worth holding onto. I never want to stop feeling that.", color: 'white', sig: '— Lilly' },
  { text: "I love you so much it makes me want to do things I can't write down.", color: 'cream', sig: '— Lilly ♥' },
  { text: "You have absolutely no idea what you look like when you sleep. I do. It's my favorite view.", color: 'yellow', sig: '— L' },
  { text: "The chemistry we have should be illegal. Not complaining. Not even a little.", color: 'pink', sig: '— Lilly 🔥' },
  { text: "Brett Durbin, you are the sexiest most annoying person I've ever met and I'd choose you every single time.", color: 'white', sig: '— L ♥' },
  { text: "I'm yours. You know that. Now act like it tonight.", color: 'torn', sig: '— Lilly 😈' },
  { text: "Loving you is the easiest and the hardest thing all at once. I wouldn't trade it for anything.", color: 'cream', sig: '— L ❤️' },
  { text: "I wrote you like four other versions of this note and deleted them all. This is the tame one.", color: 'torn', sig: '— L 🙈' },
  { text: "Okay I know we have things to do today but I really really don't want you to get up.", color: 'yellow', sig: '— Lilly 😅' },
];

// ── WEB ENGINE ──
let allNodes = [];
let svg, panX = 0, panY = 0, scale = 1;
let isDraggingNode = false, dragNode = null, dragOffX = 0, dragOffY = 0;
let isPanning = false, panStartX = 0, panStartY = 0, panStartPanX = 0, panStartPanY = 0;

function initWeb() {
  svg = document.getElementById('web-canvas');
  const W = window.innerWidth;
  const H = window.innerHeight;
  const cx = W / 2;
  const cy = H / 2;

  // Hub node (center)
  allNodes.push({ type: 'hub', x: cx, y: cy, id: 'hub' });

  // Place photos and notes in a spiral pattern around center
  const totalItems = photos.length + notes.length;
  // Interleave: photo, note, photo, note...
  let items = [];
  let pi = 0, ni = 0;
  while (pi < photos.length || ni < notes.length) {
    if (pi < photos.length) items.push({ type: 'photo', data: photos[pi++] });
    if (ni < notes.length) items.push({ type: 'note', data: notes[ni++] });
  }

  // Spiral layout
  const baseRadius = 220;
  const radiusStep = 55;
  const angleStep = 0.65;
  items.forEach((item, i) => {
    const angle = i * angleStep + (Math.random() * 0.3 - 0.15);
    const radius = baseRadius + i * radiusStep / (2 * Math.PI) * angleStep + (Math.random() * 40 - 20);
    const x = cx + Math.cos(angle) * radius;
    const y = cy + Math.sin(angle) * radius;
    const rotation = (Math.random() * 8 - 4);

    if (item.type === 'photo') {
      allNodes.push({ type: 'photo', x, y, rotation, data: item.data, id: 'p' + i });
    } else {
      allNodes.push({ type: 'note', x, y, rotation, data: item.data, id: 'n' + i });
    }
  });

  // Create string connections (each node connects to hub and 1-2 neighbors)
  createStrings();
  createNodes();
  updateView();

  // Pan & zoom
  webContainer.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  webContainer.addEventListener('wheel', onWheel, { passive: false });

  // Touch
  webContainer.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('touchmove', onTouchMove, { passive: false });
  window.addEventListener('touchend', onTouchEnd);

  // Center the view
  panX = 0;
  panY = 0;
  scale = Math.min(W / 2400, H / 2400, 0.85);
  scale = Math.max(scale, 0.35);
  updateView();
}

function createStrings() {
  // Each non-hub node gets a string to hub
  const hub = allNodes[0];
  const nonHub = allNodes.slice(1);

  nonHub.forEach((node, i) => {
    // String to hub
    addString(hub, node, 'hub-string');
    // String to a neighbor
    if (i > 0 && Math.random() > 0.3) {
      addString(nonHub[i-1], node, 'neighbor-string');
    }
    // Occasional skip connection
    if (i > 3 && Math.random() > 0.7) {
      const target = nonHub[Math.floor(Math.random() * i)];
      addString(target, node, 'skip-string');
    }
  });
}

function addString(a, b, cls) {
  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.setAttribute('class', cls);
  line.dataset.from = a.id;
  line.dataset.to = b.id;
  line.setAttribute('stroke', cls === 'hub-string' ? 'rgba(232,201,122,0.12)' : 'rgba(196,102,90,0.15)');
  line.setAttribute('stroke-width', cls === 'hub-string' ? '1' : '0.7');
  line.setAttribute('stroke-dasharray', cls === 'skip-string' ? '4,4' : 'none');
  svg.appendChild(line);
}

function createNodes() {
  allNodes.forEach(node => {
    let el;
    if (node.type === 'hub') {
      el = document.createElement('div');
      el.className = 'web-node hub';
      el.innerHTML = `
        <div class="hub-names">Brett <span>&amp;</span> Lilly</div>
        <div class="hub-date">JULY 10, 2013</div>
        <div class="hub-counter"><em>${days.toLocaleString()}</em> days</div>
      `;
    } else if (node.type === 'photo') {
      el = document.createElement('div');
      el.className = 'web-node photo';
      el.style.transform = `rotate(${node.rotation}deg)`;
      el.innerHTML = `<img src="${node.data.src}" loading="lazy" draggable="false"/>${node.data.label ? `<div class="photo-label">${node.data.label}</div>` : ''}`;
      // Click to lightbox (only if not dragging)
      el.addEventListener('click', (e) => {
        if (!el._wasDragged) {
          const lb = document.getElementById('lightbox');
          document.getElementById('lb-img').src = node.data.src;
          lb.classList.add('active');
        }
        el._wasDragged = false;
      });
    } else {
      el = document.createElement('div');
      el.className = `web-node note ${node.data.color}`;
      el.style.transform = `rotate(${node.rotation}deg)`;
      el.innerHTML = `${node.data.text}<span class="sig">${node.data.sig}</span>`;
    }

    el.dataset.nodeId = node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    node.el = el;
    webContainer.appendChild(el);
  });
}

function updateView() {
  const tx = panX;
  const ty = panY;

  // Update node positions
  allNodes.forEach(node => {
    if (!node.el) return;
    const sx = (node.x + tx) * scale;
    const sy = (node.y + ty) * scale;
    const w = node.type === 'hub' ? 80 : (node.type === 'photo' ? 70 : 85);
    const h = node.type === 'hub' ? 80 : (node.type === 'photo' ? 80 : 50);
    node.el.style.left = (sx - w) + 'px';
    node.el.style.top = (sy - h) + 'px';
    node.el.style.transform = `scale(${scale})${node.rotation ? ` rotate(${node.rotation}deg)` : ''}`;
    node.el.style.transformOrigin = 'center center';
  });

  // Update SVG lines
  svg.querySelectorAll('line').forEach(line => {
    const fromNode = allNodes.find(n => n.id === line.dataset.from);
    const toNode = allNodes.find(n => n.id === line.dataset.to);
    if (fromNode && toNode) {
      line.setAttribute('x1', (fromNode.x + tx) * scale);
      line.setAttribute('y1', (fromNode.y + ty) * scale);
      line.setAttribute('x2', (toNode.x + tx) * scale);
      line.setAttribute('y2', (toNode.y + ty) * scale);
    }
  });
}

// ── MOUSE EVENTS ──
function getNodeFromEl(el) {
  const nodeEl = el.closest('.web-node');
  if (!nodeEl) return null;
  return allNodes.find(n => n.id === nodeEl.dataset.nodeId);
}

function onMouseDown(e) {
  const node = getNodeFromEl(e.target);
  if (node) {
    isDraggingNode = true;
    dragNode = node;
    dragNode.el._wasDragged = false;
    const sx = (node.x + panX) * scale;
    const sy = (node.y + panY) * scale;
    dragOffX = e.clientX - sx;
    dragOffY = e.clientY - sy;
    document.body.classList.add('dragging-node');
    e.preventDefault();
  } else if (!e.target.closest('#lightbox') && !e.target.closest('#gate')) {
    isPanning = true;
    panStartX = e.clientX;
    panStartY = e.clientY;
    panStartPanX = panX;
    panStartPanY = panY;
  }
}

function onMouseMove(e) {
  if (isDraggingNode && dragNode) {
    const sx = e.clientX - dragOffX;
    const sy = e.clientY - dragOffY;
    dragNode.x = sx / scale - panX;
    dragNode.y = sy / scale - panY;
    dragNode.el._wasDragged = true;
    updateView();
  } else if (isPanning) {
    panX = panStartPanX + (e.clientX - panStartX) / scale;
    panY = panStartPanY + (e.clientY - panStartY) / scale;
    updateView();
  }
}

function onMouseUp(e) {
  isDraggingNode = false;
  dragNode = null;
  isPanning = false;
  document.body.classList.remove('dragging-node');
}

function onWheel(e) {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const newScale = Math.max(0.15, Math.min(3, scale * delta));

  // Zoom toward cursor
  const mx = e.clientX;
  const my = e.clientY;
  const worldX = mx / scale - panX;
  const worldY = my / scale - panY;

  scale = newScale;
  panX = mx / scale - worldX;
  panY = my / scale - worldY;

  updateView();
}

// ── TOUCH EVENTS ──
let lastTouchDist = 0;
function onTouchStart(e) {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    const node = getNodeFromEl(touch.target);
    if (node) {
      isDraggingNode = true;
      dragNode = node;
      dragNode.el._wasDragged = false;
      const sx = (node.x + panX) * scale;
      const sy = (node.y + panY) * scale;
      dragOffX = touch.clientX - sx;
      dragOffY = touch.clientY - sy;
      e.preventDefault();
    } else {
      isPanning = true;
      panStartX = touch.clientX;
      panStartY = touch.clientY;
      panStartPanX = panX;
      panStartPanY = panY;
    }
  } else if (e.touches.length === 2) {
    isPanning = false;
    isDraggingNode = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}

function onTouchMove(e) {
  if (e.touches.length === 1) {
    const touch = e.touches[0];
    if (isDraggingNode && dragNode) {
      const sx = touch.clientX - dragOffX;
      const sy = touch.clientY - dragOffY;
      dragNode.x = sx / scale - panX;
      dragNode.y = sy / scale - panY;
      dragNode.el._wasDragged = true;
      updateView();
      e.preventDefault();
    } else if (isPanning) {
      panX = panStartPanX + (touch.clientX - panStartX) / scale;
      panY = panStartPanY + (touch.clientY - panStartY) / scale;
      updateView();
    }
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (lastTouchDist > 0) {
      const delta = dist / lastTouchDist;
      scale = Math.max(0.15, Math.min(3, scale * delta));
      updateView();
    }
    lastTouchDist = dist;
    e.preventDefault();
  }
}

function onTouchEnd(e) {
  if (e.touches.length === 0) {
    isDraggingNode = false;
    dragNode = null;
    isPanning = false;
    lastTouchDist = 0;
  }
}

// Lightbox
document.getElementById('lightbox-close').addEventListener('click', () => document.getElementById('lightbox').classList.remove('active'));
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('active');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
</script>
